<!DOCTYPE html>
<html>
    <body>
<form>

<input type="text" name="nome" required><br><br>

<input type="email" name="email" required><br><br>

<input type="tel" name="telefone"><br><br>

<input type="date" name="nascimento"><br><br>

<select name="area">
    <option>Estudante</option>
    <option>Desenvolvedor</option>
    <option>Profissional de TI</option>
    <option>Empreendedor</option>
    <option>Outro</option>
</select><br><br>

<input type="radio" name="interesse"> Workshop de Desenvolvimento Mobile<br>
<input type="radio" name="interesse"> Ambos<br><br>

<label>Como ficou sabendo do evento?</label><br>

<input type="checkbox"> Instagram<br>
<input type="checkbox"> Faculdade / Escola<br>
<input type="checkbox"> Amigos<br>
<input type="checkbox"> Internet<br><br>

<input type="submit" value="Confirmar inscrição">

</form>

</html>
